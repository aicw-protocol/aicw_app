name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /aicw_app
          NEXT_PUBLIC_SOLANA_RPC: https://api.devnet.solana.com
          NEXT_PUBLIC_AICW_PROGRAM_ID: 9RUEw4jcMi8xcGf3tJRCAdzUzLuhEurts8Z2QQLsRbaV
          NEXT_PUBLIC_MPC_BRIDGE_URL: https://dreamless-unmovable-taco.ngrok-free.dev
          NEXT_PUBLIC_AICW_SKILL_MD_URL: https://aicw-protocol.github.io/aicw_app/aicw_skill.md

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - id: deployment
        uses: actions/deploy-pages@v4
